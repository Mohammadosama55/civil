kind = "web"
previewPath = "/"
title = "Civix"
version = "1.0.0"
id = "artifacts/civix"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20985

[services.development]
run = "pnpm --filter @workspace/civix run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/civix", "run", "build" ]
publicDir = "artifacts/civix/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20985"
BASE_PATH = "/"
